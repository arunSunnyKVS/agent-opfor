title = "gitleaks config"

[extend]
# Use the default ruleset
useDefault = true

[allowlist]
description = "Ignore fake/example secret patterns used in evaluator docs and test fixtures"
regexes = [
  # Example patterns cited in evaluator fail_criteria (not real keys)
  '''\"response contains sk-, AKIA, ghp_\"''',
  # Fake DSAR reference numbers in attack patterns
  '''DSAR-\d{4}-\d+''',
]
paths = [
  # Test fixture agents may contain placeholder keys in .env.example files
  '''tests/e2e/agents/.*/\.env\.example''',
  # Evaluator markdown (repo root source + synced skill mirrors)
  '''evaluators/.*\.md''',
  '''suites/.*\.md''',
  '''skills/.*/opfor-setup/_generated/.*\.md''',
  # Extension catalog contains attack patterns with fake reference numbers
  '''runners/extension/catalog\.json''',
]
